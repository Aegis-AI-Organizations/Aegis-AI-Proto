name: Module - Build & Test
on: workflow_call

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
      - name: Validate Proto Contracts
        run: |
          buf lint
          buf build
      - name: Coverage Policy
        run: |
          echo "Coverage N/A: this repository only contains protobuf contracts and generated artifacts are validated through buf lint/build."
