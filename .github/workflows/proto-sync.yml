name: Proto Sync

on:
  push:
    branches:
      - main
      - dev

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Proto Repo
        uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Code
        run: buf generate

      - name: Install pre-commit
        run: |
          python3 -m pip install --user pre-commit
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync Go Code (Gateway)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          # Clone Target Repo
          git clone https://x-access-token:${{ secrets.PROTO_SYNC_TOKEN }}@github.com/${{ github.repository_owner }}/Aegis-AI-Api-Gateway.git gateway-repo

          # Copy generated files
          mkdir -p gateway-repo/internal/grpc
          cp -r gen/go/* gateway-repo/internal/grpc/

          cd gateway-repo
          git add .

          # Auto-apply repository formatting/lint hooks on generated changes.
          # golangci-lint is skipped: irrelevant for proto-generated files and
          # version-sensitive (golangci-lint built with Go 1.24 can't run on Go 1.26+ modules)
          if [ -f .pre-commit-config.yaml ] && ! git diff-index --quiet HEAD; then
            CHANGED_FILES=$(git diff --name-only --cached)
            SKIP=golangci-lint pre-commit run --files $CHANGED_FILES || true
            git add .
            CHANGED_FILES=$(git diff --name-only --cached)
            if [ -n "$CHANGED_FILES" ]; then
              SKIP=golangci-lint pre-commit run --files $CHANGED_FILES || true
            fi
          fi

          if ! git diff-index --quiet HEAD; then
            git commit -m "[UPDATE] gRPC code sync from Aegis-AI-Proto"
            git push
          fi

      - name: Sync Python Code (Brain)
        run: |
          # Strip the ValidateProtobufRuntimeVersion block from generated Python files
          python3 -c "
          import os, re
          d = 'gen/python/aegis/v2'
          if os.path.exists(d):
              for f in os.listdir(d):
                  if f.endswith('_pb2.py'):
                      p = os.path.join(d, f)
                      with open(p, 'r') as file:
                          content = file.read()
                      content = re.sub(r'_runtime_version\.ValidateProtobufRuntimeVersion\([\s\S]*?\)\n', '', content, flags=re.MULTILINE)
                      with open(p, 'w') as file:
                          file.write(content)
          "

          # Clone Target Repo
          git clone https://x-access-token:${{ secrets.PROTO_SYNC_TOKEN }}@github.com/${{ github.repository_owner }}/Aegis-AI-Brain.git brain-repo

          # Copy generated files
          mkdir -p brain-repo/src/aegis
          cp -r gen/python/* brain-repo/src/

          cd brain-repo
          git add .

          # Auto-apply repository formatting/lint hooks on generated changes.
          if [ -f .pre-commit-config.yaml ] && ! git diff-index --quiet HEAD; then
            CHANGED_FILES=$(git diff --name-only --cached)
            pre-commit run --files $CHANGED_FILES || true
            git add .
            CHANGED_FILES=$(git diff --name-only --cached)
            if [ -n "$CHANGED_FILES" ]; then
              pre-commit run --files $CHANGED_FILES || true
            fi
          fi

          if ! git diff-index --quiet HEAD; then
            git commit -m "[UPDATE] gRPC code sync from Aegis-AI-Proto"
            git push
          fi
