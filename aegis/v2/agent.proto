syntax = "proto3";

package aegis.v2;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/Aegis-AI-Organizations/aegis-ai-api-gateway/internal/agrpc/aegis/v2";

service AgentService {
  // RegisterAgent is the onboarding call for a new agent using a deployment token.
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);

  // UpdateAgentStatus updates the current state of a persistent agent.
  rpc UpdateAgentStatus(UpdateAgentStatusRequest) returns (UpdateAgentStatusResponse);

  // GetUploadLink returns a presigned URL for MinIO file uploads.
  rpc GetUploadLink(GetUploadLinkRequest) returns (GetUploadLinkResponse);

  // VerifyAgentSecret validates an operational secret against an agent ID.
  rpc VerifyAgentSecret(VerifyAgentSecretRequest) returns (VerifyAgentSecretResponse);

  // ListAgents returns the persistent agents attached to a company.
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

  // GetAgentStatusSummary returns aggregated agent status counters for a company.
  rpc GetAgentStatusSummary(GetAgentStatusSummaryRequest) returns (GetAgentStatusSummaryResponse);
}

message RegisterAgentRequest {
  string token = 1;
  string name = 2;
}

message RegisterAgentResponse {
  string agent_id = 1;
  string agent_secret = 2;
}

message UpdateAgentStatusRequest {
  string agent_id = 1;
  string status = 2; // IDLE, UPLOADING, UPDATING_CONFIG, ERROR, etc.
  string payload_key = 3;
}

message UpdateAgentStatusResponse {
  bool success = 1;
}

message GetUploadLinkRequest {
  string agent_id = 1;
  string filename = 2;
  string content_type = 3;
}

message GetUploadLinkResponse {
  string url = 1;
  string method = 2;
  string object_name = 3;
}

message VerifyAgentSecretRequest {
  string agent_id = 1;
  string secret = 2;
}

message VerifyAgentSecretResponse {
  bool valid = 1;
  string tenant_id = 2;
}

message AgentRecord {
  string id = 1;
  string company_id = 2;
  string name = 3;
  string status = 4;
  google.protobuf.Timestamp last_seen = 5;
  google.protobuf.Timestamp created_at = 6;
}

message ListAgentsRequest {
  // Optional for tenant users; required for internal/admin cross-company reads.
  string company_id = 1;
}

message ListAgentsResponse {
  repeated AgentRecord agents = 1;
}

message GetAgentStatusSummaryRequest {
  // Optional for tenant users; required for internal/admin cross-company reads.
  string company_id = 1;
}

message GetAgentStatusSummaryResponse {
  int32 total_agents = 1;
  int32 active_agents = 2;
  int32 inactive_agents = 3;
  google.protobuf.Timestamp last_seen = 4;
}
