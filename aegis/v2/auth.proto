syntax = "proto3";

package aegis.v2;

option go_package = "github.com/Aegis-AI-Organizations/aegis-ai-api-gateway/internal/agrpc/aegis/v2";

// AuthService handles user authentication, session management, and JWT generation.
service AuthService {
  // Login authenticates a user and returns an access token and refresh token.
  rpc Login(LoginRequest) returns (LoginResponse);

  // Refresh generates a new access token using a valid refresh token.
  rpc Refresh(RefreshRequest) returns (RefreshResponse);

  // Logout invalidates a refresh token.
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // SetupPassword activates an invited owner account and creates a session.
  rpc SetupPassword(SetupPasswordRequest) returns (SetupPasswordResponse);

  // GetMe retrieves the authenticated user's profile and company information.
  rpc GetMe(GetMeRequest) returns (GetMeResponse);

  // UpdateProfile updates the authenticated user's profile information.
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);

  // UpdateEmail updates the authenticated user's email address.
  rpc UpdateEmail(UpdateEmailRequest) returns (UpdateEmailResponse);

  // UpdatePassword updates the authenticated user's password.
  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);

  // RemoveAvatar deletes the authenticated user's profile picture.
  rpc RemoveAvatar(RemoveAvatarRequest) returns (RemoveAvatarResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message SetupPasswordRequest {
  string invitation_token = 1;
  string new_password = 2;
}

message SetupPasswordResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message GetMeRequest {}

message GetMeResponse {
  string id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
  string company_id = 5;
  string company_name = 6;
  string avatar_url = 7;
}

message UpdateProfileRequest {
  string name = 1;
  string avatar_url = 2;
}

message UpdateProfileResponse {
  bool success = 1;
}

message UpdateEmailRequest {
  string new_email = 1;
}

message UpdateEmailResponse {
  bool success = 1;
}

message UpdatePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message UpdatePasswordResponse {
  bool success = 1;
}

message RemoveAvatarRequest {}

message RemoveAvatarResponse {
  bool success = 1;
}
