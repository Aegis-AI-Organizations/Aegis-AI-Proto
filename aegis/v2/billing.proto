syntax = "proto3";

package aegis.v2;

option go_package = "github.com/Aegis-AI-Organizations/aegis-ai-api-gateway/internal/agrpc/aegis/v2";

import "google/protobuf/timestamp.proto";

// BillingService handles token management and consumption history.
service BillingService {
  // GetBalance retrieves the current token balance for a company.
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);

  // GetLedger retrieves the history of token transactions for a company.
  rpc GetLedger(GetLedgerRequest) returns (GetLedgerResponse);

  // AdjustTokens adds or subtracts tokens from a company's balance.
  rpc AdjustTokens(AdjustTokensRequest) returns (AdjustTokensResponse);

  // PreFlightCheck estimates the cost of a scan and checks if the balance is sufficient.
  rpc PreFlightCheck(PreFlightCheckRequest) returns (PreFlightCheckResponse);
}

message GetBalanceRequest {
  string company_id = 1;
}

message GetBalanceResponse {
  string company_id = 1;
  int64 balance = 2;
}

message GetLedgerRequest {
  string company_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetLedgerResponse {
  repeated LedgerEntry entries = 1;
  int32 total = 2;
}

message LedgerEntry {
  string id = 1;
  string company_id = 2;
  int64 amount = 3;
  string reason = 4;
  string scan_id = 5; // Optional
  google.protobuf.Timestamp created_at = 6;
}

message AdjustTokensRequest {
  string company_id = 1;
  int64 amount = 2;
  string reason = 3;
}

message AdjustTokensResponse {
  string company_id = 1;
  int64 balance = 2;
}

message PreFlightCheckRequest {
  string company_id = 1;
  TargetConfig target_config = 2;
}

message TargetConfig {
  int32 ip_count = 1;
  int32 api_count = 2;
  int32 webapp_count = 3;
}

message PreFlightCheckResponse {
  bool sufficient_balance = 1;
  int64 estimated_cost = 2;
  int64 current_balance = 3;
}
