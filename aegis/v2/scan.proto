syntax = "proto3";

package aegis.v2;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/Aegis-AI-Organizations/aegis-ai-api-gateway/internal/agrpc/aegis/v2";

// ScanService handles orchestration of security scans.
service ScanService {
  // StartScan initiates a new security scan for a target image.
  rpc StartScan(StartScanRequest) returns (StartScanResponse);

  // GetScanStatus returns the current status and timing of a scan.
  rpc GetScanStatus(GetScanStatusRequest) returns (GetScanStatusResponse);

  // ListScans retrieves a history of all scans.
  rpc ListScans(ListScansRequest) returns (ListScansResponse);

  // GetScanReport returns the PDF report data for a completed scan.
  rpc GetScanReport(GetScanReportRequest) returns (GetScanReportResponse);

  // WatchScanStatus provides a stream of scan status updates.
  rpc WatchScanStatus(WatchScanStatusRequest) returns (stream WatchScanStatusResponse);

  // UpdateScanStatus updates the status of a scan (called by Agents).
  rpc UpdateScanStatus(UpdateScanStatusRequest) returns (UpdateScanStatusResponse);

  // CreateVulnerabilities reports findings for a scan (called by Agents).
  rpc CreateVulnerabilities(CreateVulnerabilitiesRequest) returns (CreateVulnerabilitiesResponse);
}

message StartScanRequest {
  string target_image = 1;
}

message StartScanResponse {
  string scan_id = 1;
  string status = 2;
  google.protobuf.Timestamp started_at = 3;
}

message GetScanStatusRequest {
  string scan_id = 1;
}

message GetScanStatusResponse {
  string scan_id = 1;
  string status = 2;
  google.protobuf.Timestamp started_at = 3;
  google.protobuf.Timestamp completed_at = 4;
  string temporal_workflow_id = 5;
  string target_image = 6;
}

message ListScansRequest {}

message ScanDetails {
  string scan_id = 1;
  string temporal_workflow_id = 2;
  string target_image = 3;
  string status = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp completed_at = 6;
  string company_name = 7;
}

message ListScansResponse {
  repeated ScanDetails scans = 1;
}

message GetScanReportRequest {
  string scan_id = 1;
}

message GetScanReportResponse {
  bytes pdf_data = 1;
}

message WatchScanStatusRequest {
  string scan_id = 1;
}

message WatchScanStatusResponse {
  string scan_id = 1;
  string status = 2;
}

message UpdateScanStatusRequest {
  string scan_id = 1;
  string status = 2;
}

message UpdateScanStatusResponse {
  bool success = 1;
}

message VulnerabilityFinding {
  string vuln_type = 1;
  string severity = 2;
  string target_endpoint = 3;
  string description = 4;
  repeated EvidenceFinding evidences = 5;
}

message EvidenceFinding {
  string payload_used = 1;
  string loot_data = 2;
}

message CreateVulnerabilitiesRequest {
  string scan_id = 1;
  repeated VulnerabilityFinding vulnerabilities = 2;
}

message CreateVulnerabilitiesResponse {
  bool success = 1;
  int32 count = 2;
}
