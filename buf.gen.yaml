version: v1
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  - plugin: buf.build/grpc/go
    out: gen/go
    opt: paths=source_relative
  - plugin: buf.build/protocolbuffers/python:v29.3
    out: gen/python
  - plugin: buf.build/grpc/python:v1.70.0
    out: gen/python
