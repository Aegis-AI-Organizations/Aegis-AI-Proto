version: v1
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  - plugin: buf.build/grpc/go
    out: gen/go
    opt: paths=source_relative
  - plugin: buf.build/protocolbuffers/python:v27.2
    out: gen/python
  - plugin: buf.build/grpc/python:v1.64.1
    out: gen/python
